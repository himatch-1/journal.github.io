<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>side quest journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    /* warm kraft-paper / sepia photograph palette */
    --cream: #E9DCC0;
    --page: #F7EFDD;
    --pageLine: #DBC69C;
    --ink: #3A2A1C;
    --inkSoft: #8A7256;
    --tan: #C4AC82;
    --tanStrong: #A6875A;
    --coral: #A8552E;
    --coralSoft: #C68558;
    --teal: #4A3626;
    --tealSoft: #8C6845;
    --plum: #6B4128;
    --plumSoft: #A97C50;
    --amber: #AD7E34;
    --white: #FFFAEE;
    --font-header: 'Caveat', cursive;
    --font-body: 'Kalam', cursive;
    --font-meta: 'Special Elite', monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--cream);
    overscroll-behavior-y: none;
  }

  body {
    font-family: var(--font-body);
    color: var(--ink);
    display: flex;
    justify-content: center;
  }

  #app-shell {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ---------- PaperPage ---------- */
  .paper-page {
    flex: 1;
    display: flex;
    flex-direction: row;
    background: var(--page);
    min-height: 0;
  }

  .spiral {
    width: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    align-items: center;
    padding: 40px 0;
    flex-shrink: 0;
  }

  .spiral-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--page);
    border: 1.5px solid var(--tanStrong);
  }

  .page-content-wrap {
    flex: 1;
    overflow-y: auto;
    position: relative;
    background-image:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 33px,
        var(--pageLine) 33px,
        var(--pageLine) 34px
      ),
      radial-gradient(circle at 15% 25%, rgba(58,42,28,0.05) 0.6px, transparent 0.6px),
      radial-gradient(circle at 65% 60%, rgba(58,42,28,0.045) 0.6px, transparent 0.6px),
      radial-gradient(circle at 40% 85%, rgba(58,42,28,0.04) 0.6px, transparent 0.6px);
    background-size: auto, 5px 5px, 7px 7px, 6px 6px;
    background-position: 0 40px, 0 0, 0 0, 0 0;
  }

  .page-content {
    padding: 24px 18px 100px 18px;
    position: relative;
    min-height: 100%;
  }

  .screen-title {
    font-family: var(--font-header);
    font-weight: 700;
    font-size: 34px;
    color: var(--plum);
    transform: rotate(-1deg);
    margin: 0;
    display: inline-block;
  }

  .screen-subtitle {
    font-family: var(--font-meta);
    font-size: 11px;
    letter-spacing: 0.3px;
    color: var(--inkSoft);
    margin: 4px 0 18px 0;
  }

  .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }

  .postmark {
    flex-shrink: 0;
    width: 68px; height: 68px;
    border: 2px dashed var(--stamp-color, var(--ink));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    color: var(--stamp-color, var(--ink));
    font-family: var(--font-meta);
    font-size: 8.5px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    line-height: 1.35;
    transform: rotate(-9deg);
    opacity: 0.7;
    margin-top: 4px;
  }

  /* ---------- Tab bar ---------- */
  .tab-bar {
    display: flex;
    justify-content: space-around;
    background: var(--cream);
    padding: 8px 10px calc(16px + env(safe-area-inset-bottom, 0px)) 10px;
    border-top: 1px solid var(--tan);
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
  }

  .tab-btn {
    border: none;
    padding: 8px 14px;
    border-radius: 4px;
    color: var(--white);
    font-size: 11px;
    font-weight: 400;
    font-family: var(--font-meta);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0.7;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  .tab-btn.active { opacity: 1; transform: translateY(-3px); }
  .tab-btn[data-tab="quests"] { background: var(--coral); }
  .tab-btn[data-tab="diary"] { background: var(--plum); }
  .tab-btn[data-tab="gallery"] { background: var(--teal); }
  .tab-btn[data-tab="goals"] { background: var(--amber); }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ---------- Quest card ---------- */
  .quest-card {
    background: var(--white);
    border: 1.5px solid var(--tan);
    border-radius: 5px;
    padding: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    box-shadow: 1px 2px 0 rgba(58,42,28,0.06);
  }
  .quest-card.done { opacity: 0.55; }
  .quest-icon { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
  .quest-info { flex: 1; min-width: 0; }
  .quest-name { font-family: var(--font-body); font-weight: 700; font-size: 16px; color: var(--ink); }
  .quest-name.done { text-decoration: line-through; }
  .quest-meta { font-family: var(--font-meta); font-size: 10px; margin-top: 3px; letter-spacing: 0.2px; }
  .quest-btn {
    width: 34px; height: 34px; border-radius: 17px;
    border: 1.5px solid var(--tanStrong);
    background: var(--page);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; flex-shrink: 0;
  }
  .quest-btn:disabled { cursor: default; }

  .energy-row { display: flex; gap: 6px; justify-content: center; margin-top: 18px; align-items: center; }
  .heart { font-size: 18px; }
  .energy-label { font-family: var(--font-meta); font-size: 10px; color: var(--inkSoft); margin-left: 6px; letter-spacing: 0.3px; }
  .xp-line { font-family: var(--font-meta); text-align: center; font-size: 11px; color: var(--inkSoft); margin-top: 6px; letter-spacing: 0.3px; }
  .xp-value { color: var(--coral); font-weight: 700; }


  /* ---------- Diary ---------- */
  .diary-entry {
    background: var(--white);
    border: 1.5px solid var(--tan);
    border-radius: 4px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
    box-shadow: 1px 2px 0 rgba(58,42,28,0.06);
  }
  .diary-tape {
    position: absolute; top: -6px; left: 20px;
    width: 44px; height: 16px; opacity: 0.7;
    transform: rotate(-4deg); border-radius: 1px;
    box-shadow: 0 1px 2px rgba(58,42,28,0.15);
  }
  .diary-date { font-family: var(--font-meta); font-size: 10px; color: var(--inkSoft); letter-spacing: 0.3px; }
  .diary-text { font-family: var(--font-body); font-size: 15px; margin-top: 4px; color: var(--ink); white-space: pre-wrap; }

  .release-btn {
    background: var(--plum);
    border: none;
    border-radius: 5px;
    padding: 12px;
    width: 100%;
    color: var(--white);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    margin-top: 12px;
  }

  .empty-note { color: var(--inkSoft); font-size: 13px; font-style: italic; margin: 6px 0 16px 0; }

  /* ---------- Release modal ---------- */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(58,42,28,0.4);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .release-card {
    width: 100%; max-width: 420px;
    background: var(--page);
    border-radius: 6px;
    border: 1.5px solid var(--tanStrong);
    padding: 18px;
  }
  .release-title-tape {
    align-self: center; margin: 0 auto 12px auto;
    background: rgba(169,124,80,0.18);
    border: 1px solid var(--plumSoft);
    border-radius: 4px;
    padding: 2px 14px;
    transform: rotate(-2deg);
    width: fit-content;
  }
  .release-title-text { font-family: var(--font-header); font-weight: 700; font-size: 22px; color: var(--plum); }
  .release-stage { min-height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
  .release-paper {
    width: 100%; background: var(--white);
    border: 1.5px solid var(--tan);
    padding: 14px; border-radius: 4px;
    transition: transform 0.55s ease, opacity 0.55s ease, border-radius 0.4s ease;
    transform-origin: center;
  }
  .release-paper textarea {
    width: 100%; min-height: 100px; border: none; outline: none;
    resize: none; background: transparent;
    font-family: var(--font-body); font-size: 15px; color: var(--ink);
  }
  .release-paper.burning {
    transform: scale(0.15) rotate(70deg) translateY(-160px);
    opacity: 0; border-radius: 60px;
  }
  .release-paper.keeping {
    transform: scaleY(0.12) translateY(40px);
    opacity: 0;
  }
  .release-envelope {
    position: absolute; width: 140px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease, transform 0.5s ease;
  }
  .release-envelope.show { opacity: 1; transform: translateY(30px); }
  .env-body { height: 70px; background: var(--white); border: 1.5px solid var(--tanStrong); border-radius: 4px; }
  .env-flap {
    position: absolute; top: 0; width: 100%; height: 36px;
    background: var(--cream); border: 1.5px solid var(--tanStrong);
    transform-origin: top; transition: transform 0.4s ease;
  }
  .release-envelope.show .env-flap { transform: rotateX(180deg); }
  .release-actions { display: flex; gap: 10px; margin-top: 16px; }
  .release-action-btn {
    flex: 1; border-radius: 4px; padding: 10px; text-align: center;
    background: var(--white); font-family: var(--font-body); font-weight: 700; font-size: 14px;
    cursor: pointer; border: 1.5px solid;
  }
  .release-close-btn {
    margin-top: 14px; text-align: center; color: var(--inkSoft);
    font-family: var(--font-meta); cursor: pointer; background: none; border: none; width: 100%; font-size: 12px; letter-spacing: 0.3px;
  }

  /* ---------- Gallery ---------- */
  .gallery-grid { display: flex; flex-wrap: wrap; gap: 14px; }
  .polaroid {
    position: relative;
    width: 46%;
    background: var(--white);
    border: 1.5px solid var(--tan);
    border-radius: 3px;
    padding: 6px 6px 12px 6px;
    box-shadow: 1px 2px 0 rgba(58,42,28,0.08);
    overflow: hidden;
  }
  .polaroid::before, .polaroid::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: var(--tanStrong);
    opacity: 0.55;
    z-index: 1;
  }
  .polaroid::before { top: 0; left: 0; clip-path: polygon(0 0, 100% 0, 0 100%); }
  .polaroid::after { bottom: 12px; right: 0; clip-path: polygon(100% 100%, 0 100%, 100% 0); }
  .polaroid img { width: 100%; height: 90px; object-fit: cover; border-radius: 2px; background: var(--cream); display: block; filter: sepia(0.25) contrast(1.03); }
  .polaroid-caption { font-family: var(--font-meta); font-size: 10px; letter-spacing: 0.2px; text-align: center; margin-top: 6px; color: var(--ink); }
  .upload-btn {
    margin-top: 16px; background: var(--teal); border: none; border-radius: 5px;
    padding: 12px; width: 100%; color: var(--white); font-family: var(--font-body); font-weight: 700;
    font-size: 15px; cursor: pointer;
  }

  /* ---------- Goals ---------- */
  .goal-box { background: var(--white); border: 1.5px solid var(--tan); border-radius: 5px; padding: 14px; margin-bottom: 14px; box-shadow: 1px 2px 0 rgba(58,42,28,0.06); }
  .goal-label { font-family: var(--font-meta); font-size: 10px; letter-spacing: 0.3px; text-transform: uppercase; margin-bottom: 8px; color: var(--inkSoft); }
  .goal-input {
    width: 100%; border: 1.5px solid var(--tan); border-radius: 4px; padding: 8px;
    font-family: var(--font-body); font-size: 14px; margin-bottom: 8px; color: var(--ink);
    background: var(--page);
  }
  .create-btn {
    background: var(--teal); border: none; border-radius: 4px; padding: 10px; width: 100%;
    color: var(--white); font-family: var(--font-body); font-weight: 700; cursor: pointer;
  }
  .goal-title { font-size: 15px; margin-bottom: 10px; color: var(--ink); }
  .plant-emoji { font-size: 38px; text-align: center; margin-bottom: 6px; }
  .progress-track { background: var(--cream); border-radius: 4px; height: 10px; border: 1px solid var(--tan); overflow: hidden; }
  .progress-fill { background: var(--tealSoft); height: 100%; transition: width 0.4s ease; }
  .week-label { font-family: var(--font-meta); font-size: 10px; color: var(--inkSoft); text-align: right; margin-top: 4px; letter-spacing: 0.2px; }
  .section-label {
    font-family: var(--font-header); font-weight: 700; font-size: 24px; color: var(--teal);
    border-top: 1.5px dashed var(--tan); padding-top: 14px; margin: 4px 0 10px 0;
  }
  .workout-card {
    background: var(--white); border: 1.5px solid var(--tan); border-radius: 5px; padding: 10px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    box-shadow: 1px 2px 0 rgba(58,42,28,0.06);
  }
  .workout-icon { font-size: 20px; width: 28px; text-align: center; }
  .workout-name { flex: 1; font-family: var(--font-body); font-weight: 700; font-size: 15px; color: var(--ink); }
  .workout-btn {
    width: 30px; height: 30px; border-radius: 15px; border: 1.5px solid var(--tanStrong);
    display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--page);
  }

  input[type="file"] { display: none; }

  /* ---------- Interaction feedback ---------- */
  .sound-toggle {
    position: fixed; top: 10px; right: 10px;
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--white); border: 1.5px solid var(--tanStrong);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; cursor: pointer; z-index: 60;
    box-shadow: 0 2px 6px rgba(65,57,44,0.18);
    transition: transform 0.15s ease;
  }
  .sound-toggle:active { transform: scale(0.85); }

  .quest-btn, .workout-btn, .upload-btn, .create-btn, .release-btn, .release-action-btn, .tab-btn {
    transition: transform 0.12s ease, opacity 0.15s ease;
  }
  .quest-btn:active:not(:disabled), .workout-btn:active,
  .upload-btn:active, .create-btn:active, .release-btn:active, .release-action-btn:active {
    transform: scale(0.88);
  }

  @keyframes cardPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.045); box-shadow: 0 4px 14px rgba(216,90,48,0.25); }
    55% { transform: scale(0.98); }
    100% { transform: scale(1); box-shadow: none; }
  }
  .quest-card.just-completed, .workout-card.just-completed { animation: cardPop 0.45s ease; }

  @keyframes heartPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.35) rotate(-6deg); }
    100% { transform: scale(1); }
  }
  .heart.pulse { display: inline-block; animation: heartPulse 0.45s ease; }

  @keyframes xpBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  .xp-value.bump { display: inline-block; animation: xpBump 0.4s ease; }

  .float-xp {
    position: fixed;
    font-family: var(--font-header);
    font-weight: 700;
    font-size: 22px;
    color: var(--coral);
    pointer-events: none;
    z-index: 200;
    animation: floatUp 0.95s ease forwards;
    text-shadow: 0 1px 2px rgba(255,255,255,0.8);
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.7); opacity: 0; }
    18% { opacity: 1; transform: translateY(-8px) scale(1.15); }
    100% { transform: translateY(-52px) scale(1); opacity: 0; }
  }

  .confetti-piece {
    position: fixed;
    width: 7px; height: 7px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 199;
    animation: confettiBurst 0.8s cubic-bezier(0.2,0.8,0.3,1) forwards;
  }
  @keyframes confettiBurst {
    0% { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(0.4); opacity: 0; }
  }

  @keyframes polaroidDevelop {
    0% { filter: grayscale(1) brightness(1.6) contrast(0.5) blur(2px); opacity: 0.35; }
    55% { filter: grayscale(0.25) brightness(1.1) contrast(0.9) blur(0.5px); opacity: 0.9; }
    100% { filter: grayscale(0) brightness(1) contrast(1) blur(0); opacity: 1; }
  }
  .polaroid.developing img { animation: polaroidDevelop 1.1s ease forwards; }
  .polaroid.developing { animation: cardPop 0.5s ease 0.9s backwards; }

  @keyframes plantBounce {
    0% { transform: scale(1) rotate(0); }
    45% { transform: scale(1.35) rotate(-8deg); }
    70% { transform: scale(0.95) rotate(4deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .plant-emoji.bump { animation: plantBounce 0.55s ease; }

  @keyframes fillGrow {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.35); }
    100% { filter: brightness(1); }
  }
  .progress-fill.bump { animation: fillGrow 0.5s ease; }

  @media (prefers-reduced-motion: reduce) {
    .quest-card.just-completed, .workout-card.just-completed,
    .heart.pulse, .xp-value.bump, .float-xp, .confetti-piece,
    .polaroid.developing img, .polaroid.developing, .plant-emoji.bump, .progress-fill.bump {
      animation: none !important;
    }
  }
</style>
</head>
<body>
<div id="app-shell">

  <!-- ===== QUESTS ===== -->
  <div class="screen active" id="screen-quests">
    <div class="paper-page">
      <div class="spiral" id="spiral-quests"></div>
      <div class="page-content-wrap">
        <div class="page-content">
          <div class="title-row">
            <div>
              <h1 class="screen-title">side quests today</h1>
              <p class="screen-subtitle">6 lil wins waiting for you · new set esok</p>
            </div>
            <div class="postmark" style="--stamp-color: var(--coral)">◆ est.<br>today ◆</div>
          </div>
          <div id="quest-list"></div>
          <div class="energy-row" id="energy-row"></div>
          <p class="xp-line">xp today: <span class="xp-value" id="xp-today">0</span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== DIARY ===== -->
  <div class="screen" id="screen-diary">
    <div class="paper-page">
      <div class="spiral" id="spiral-diary"></div>
      <div class="page-content-wrap">
        <div class="page-content">
          <div class="title-row">
            <div>
              <h1 class="screen-title">diary</h1>
              <p class="screen-subtitle">entries you chose to keep</p>
            </div>
            <div class="postmark" style="--stamp-color: var(--plum)">◆ private ◆</div>
          </div>
          <div id="diary-list"></div>
          <button class="release-btn" id="open-release">✎ let it out</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== GALLERY ===== -->
  <div class="screen" id="screen-gallery">
    <div class="paper-page">
      <div class="spiral" id="spiral-gallery"></div>
      <div class="page-content-wrap">
        <div class="page-content">
          <div class="title-row">
            <div>
              <h1 class="screen-title">achievement gallery</h1>
              <p class="screen-subtitle">proof of the lil wins</p>
            </div>
            <div class="postmark" style="--stamp-color: var(--teal)">◆ evidence ◆</div>
          </div>
          <div class="gallery-grid" id="gallery-grid"></div>
          <button class="upload-btn" id="upload-photo-btn">+ upload photo</button>
          <input type="file" id="gallery-file-input" accept="image/*">
        </div>
      </div>
    </div>
  </div>

  <!-- ===== GOALS ===== -->
  <div class="screen" id="screen-goals">
    <div class="paper-page">
      <div class="spiral" id="spiral-goals"></div>
      <div class="page-content-wrap">
        <div class="page-content">
          <div class="title-row">
            <div>
              <h1 class="screen-title">goals &amp; progress</h1>
              <p class="screen-subtitle">small steps, not big scary numbers</p>
            </div>
            <div class="postmark" style="--stamp-color: var(--amber)">◆ in prog. ◆</div>
          </div>
          <div id="goals-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TAB BAR ===== -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="quests">quests</button>
    <button class="tab-btn" data-tab="diary">diary</button>
    <button class="tab-btn" data-tab="gallery">gallery</button>
    <button class="tab-btn" data-tab="goals">goals</button>
  </div>
</div>

<!-- ===== RELEASE MODAL ===== -->
<div class="modal-overlay" id="release-overlay">
  <div class="release-card">
    <div class="release-title-tape"><span class="release-title-text">let it out</span></div>
    <div class="release-stage">
      <div class="release-paper" id="release-paper">
        <textarea id="release-textarea" placeholder="tulis je, takde siapa nilai..."></textarea>
      </div>
      <div class="release-envelope" id="release-envelope">
        <div class="env-body"></div>
        <div class="env-flap"></div>
      </div>
    </div>
    <div class="release-actions" id="release-actions">
      <div class="release-action-btn" id="release-burn" style="border-color: var(--coral); color: var(--coral);">🔥 lepaskan</div>
      <div class="release-action-btn" id="release-keep" style="border-color: var(--teal); color: var(--teal);">✉️ simpan</div>
    </div>
    <button class="release-close-btn" id="release-close">tutup</button>
  </div>
</div>

<input type="file" id="quest-file-input" accept="image/*" capture="environment">

<button class="sound-toggle" id="sound-toggle" aria-label="toggle sound" title="toggle sound">🔊</button>

<script>
(function () {
  'use strict';

  // ---------- storage helpers ----------
  const store = {
    get(key, fallback) {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
      } catch (e) { return fallback; }
    },
    set(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); }
      catch (e) { console.warn('storage full or unavailable', e); }
    }
  };

  const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  // ---------- quest pool + seeded picker (ported 1:1 from questPool.ts) ----------
  const commonPool = [
    { icon: '💧', name: 'hydrate the meat sack' },
    { icon: '🪟', name: 'buka langsir, kena cahaya matahari' },
    { icon: '🪥', name: 'gosok gigi tanpa scroll' },
    { icon: '🛏️', name: 'kemas katil' },
    { icon: '📵', name: '15 min tanpa phone' },
  ];
  const rarePool = [
    { icon: '🧦', name: 'defeat the laundry golem' },
    { icon: '🧹', name: 'declutter satu drawer' },
    { icon: '📞', name: 'call someone you miss' },
    { icon: '🍱', name: 'masak/prepare meal sendiri' },
  ];
  const legendaryPool = [
    { icon: '🚶', name: 'walk without ur phone' },
    { icon: '📓', name: 'tulis 3 benda kau grateful' },
    { icon: '🌅', name: 'tengok sunrise/sunset' },
  ];
  const XP = { common: 10, rare: 25, legendary: 50 };
  const tierColor = { common: 'var(--tanStrong)', rare: 'var(--teal)', legendary: 'var(--plum)' };
  const tierLabel = { common: 'common quest', rare: 'rare quest', legendary: 'legendary quest' };

  function seededRandom(seed) {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  function hashDate(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) | 0;
    return h;
  }
  function seededPick(pool, n, seed) {
    const arr = [...pool];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(seededRandom(seed + i) * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr.slice(0, n);
  }
  function getDailyQuestSet(dateStr) {
    const seed = hashDate(dateStr);
    const common = seededPick(commonPool, 3, seed).map(q => ({ ...q, tier: 'common', xp: XP.common }));
    const rare = seededPick(rarePool, 2, seed + 100).map(q => ({ ...q, tier: 'rare', xp: XP.rare }));
    const legendary = seededPick(legendaryPool, 1, seed + 200).map(q => ({ ...q, tier: 'legendary', xp: XP.legendary }));
    return [...common, ...rare, ...legendary];
  }

  // ---------- image compression (replaces native camera/photo-lib) ----------
  function readAndCompressImage(file, maxDim = 700, quality = 0.7) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = () => reject(new Error('read failed'));
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => reject(new Error('image decode failed'));
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ---------- sound feedback ----------
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { audioCtx = null; }
    }
    return audioCtx;
  }
  function isSoundOn() { return store.get('sq_sound_on', true); }
  function setSoundOn(v) { store.set('sq_sound_on', v); }

  function playTone(freq, duration, type, gainPeak, delay) {
    if (!isSoundOn()) return;
    const ctx = getAudioCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime + (delay || 0);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(gainPeak || 0.15, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.start(now);
    osc.stop(now + duration + 0.03);
  }
  function playPop() { playTone(520, 0.12, 'triangle', 0.12, 0); }
  function playChime() {
    playTone(660, 0.18, 'sine', 0.16, 0);
    playTone(880, 0.22, 'sine', 0.14, 0.09);
    playTone(1175, 0.28, 'sine', 0.12, 0.18);
  }
  function playSwoosh() { playTone(320, 0.3, 'sawtooth', 0.05, 0); }

  const soundBtn = document.getElementById('sound-toggle');
  function refreshSoundBtn() { soundBtn.textContent = isSoundOn() ? '🔊' : '🔇'; }
  refreshSoundBtn();
  soundBtn.addEventListener('click', () => {
    setSoundOn(!isSoundOn());
    refreshSoundBtn();
    if (isSoundOn()) playPop();
  });

  // ---------- confetti + floating text ----------
  function burstConfetti(x, y, colorList) {
    const colors = colorList || ['var(--coral)', 'var(--teal)', 'var(--plum)', 'var(--amber)', 'var(--tealSoft)'];
    for (let i = 0; i < 14; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const angle = Math.random() * Math.PI * 2;
      const dist = 40 + Math.random() * 55;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 25;
      piece.style.setProperty('--tx', tx + 'px');
      piece.style.setProperty('--ty', ty + 'px');
      piece.style.setProperty('--rot', (Math.random() * 360) + 'deg');
      piece.style.left = x + 'px';
      piece.style.top = y + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 850);
    }
  }
  function floatText(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'float-xp';
    el.textContent = text;
    if (color) el.style.color = color;
    el.style.left = (x - 24) + 'px';
    el.style.top = y + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
  function bumpClass(el, className) {
    if (!el) return;
    el.classList.remove(className);
    void el.offsetWidth;
    el.classList.add(className);
  }

  // ---------- spiral binding render ----------
  document.querySelectorAll('.spiral').forEach(spiral => {
    for (let i = 0; i < 10; i++) {
      const dot = document.createElement('div');
      dot.className = 'spiral-dot';
      spiral.appendChild(dot);
    }
  });

  // ---------- tab navigation ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const screens = {
    quests: document.getElementById('screen-quests'),
    diary: document.getElementById('screen-diary'),
    gallery: document.getElementById('screen-gallery'),
    goals: document.getElementById('screen-goals'),
  };
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[btn.dataset.tab].classList.add('active');
      if (btn.dataset.tab === 'quests') renderQuests();
      if (btn.dataset.tab === 'diary') renderDiary();
      if (btn.dataset.tab === 'gallery') renderGallery();
      if (btn.dataset.tab === 'goals') renderGoals();
    });
  });

  // =========================================================
  // QUESTS
  // =========================================================
  let pendingQuestId = null;
  let pendingQuestPos = null;

  function loadTodayQuests() {
    const date = todayStr();
    let all = store.get('sq_quests', {}); // { date: [quest,...] }
    if (!all[date]) {
      const seedSet = getDailyQuestSet(date);
      all[date] = seedSet.map(q => ({
        id: uid(), date, name: q.name, icon: q.icon, tier: q.tier, xp: q.xp,
        completed: 0, photo_uri: null, completed_at: null,
      }));
      store.set('sq_quests', all);
    }
    return all[date];
  }

  function saveTodayQuests(quests) {
    const date = todayStr();
    let all = store.get('sq_quests', {});
    all[date] = quests;
    store.set('sq_quests', all);
  }

  function getEnergy() { return store.get('sq_energy', 3); }
  function setEnergy(h) { store.set('sq_energy', Math.max(0, Math.min(3, h))); }

  function addGalleryPhoto(uri, caption, questId) {
    const photos = store.get('sq_gallery', []);
    const newId = uid();
    photos.unshift({ id: newId, quest_id: questId, uri, caption, created_at: new Date().toISOString() });
    store.set('sq_gallery', photos);
    return newId;
  }

  function renderQuests(celebrate) {
    const quests = loadTodayQuests();
    const listEl = document.getElementById('quest-list');
    listEl.innerHTML = '';
    quests.forEach(q => {
      const card = document.createElement('div');
      card.className = 'quest-card' + (q.completed ? ' done' : '');
      card.dataset.questId = q.id;
      card.innerHTML = `
        <div class="quest-icon">${q.icon}</div>
        <div class="quest-info">
          <div class="quest-name${q.completed ? ' done' : ''}">${escapeHtml(q.name)}</div>
          <div class="quest-meta" style="color:${tierColor[q.tier]}">${tierLabel[q.tier]} · +${q.xp}xp</div>
        </div>
        <button class="quest-btn" ${q.completed ? 'disabled' : ''} data-id="${q.id}">${q.completed ? '✓' : '📸'}</button>
      `;
      listEl.appendChild(card);
    });
    listEl.querySelectorAll('.quest-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        pendingQuestId = btn.dataset.id;
        const rect = btn.getBoundingClientRect();
        pendingQuestPos = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        playPop();
      });
    });

    const energy = getEnergy();
    const energyRow = document.getElementById('energy-row');
    energyRow.innerHTML = [0, 1, 2].map(i =>
      `<span class="heart${celebrate && celebrate.energyDropped ? ' pulse' : ''}">${i < energy ? '❤️' : '🤍'}</span>`
    ).join('') + `<span class="energy-label">quest energy</span>`;

    const xpToday = quests.filter(q => q.completed).reduce((sum, q) => sum + q.xp, 0);
    const xpEl = document.getElementById('xp-today');
    xpEl.textContent = xpToday;

    if (celebrate && celebrate.questId) {
      const cardEl = listEl.querySelector(`[data-quest-id="${celebrate.questId}"]`);
      if (cardEl) cardEl.classList.add('just-completed');
      bumpClass(xpEl, 'bump');
      playChime();
      const pos = celebrate.pos || { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      burstConfetti(pos.x, pos.y);
      floatText(pos.x, pos.y, '+' + celebrate.xp + 'xp');
    }
  }

  document.getElementById('quest-file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!pendingQuestId) return;
    const quests = loadTodayQuests();
    const quest = quests.find(q => q.id === pendingQuestId);
    if (!quest) { pendingQuestId = null; pendingQuestPos = null; return; }

    let photoUri = null;
    if (file) {
      try { photoUri = await readAndCompressImage(file); } catch (err) { photoUri = null; }
    }
    quest.completed = 1;
    quest.photo_uri = photoUri;
    quest.completed_at = new Date().toISOString();
    saveTodayQuests(quests);
    if (photoUri) addGalleryPhoto(photoUri, quest.name, quest.id);

    const celebrate = { questId: quest.id, xp: quest.xp, pos: pendingQuestPos };
    pendingQuestId = null;
    pendingQuestPos = null;
    renderQuests(celebrate);
  });

  // =========================================================
  // DIARY
  // =========================================================
  const tapeColors = ['var(--coralSoft)', 'var(--tealSoft)', 'var(--plumSoft)'];

  function getDiaryEntries() {
    return store.get('sq_diary', []);
  }
  function addDiaryEntry(text, tape) {
    const entries = getDiaryEntries();
    entries.unshift({ id: uid(), created_at: new Date().toISOString(), text, mood: null, tape_color: tape });
    store.set('sq_diary', entries);
  }

  function renderDiary() {
    const entries = getDiaryEntries();
    const listEl = document.getElementById('diary-list');
    listEl.innerHTML = '';
    if (entries.length === 0) {
      listEl.innerHTML = `<p class="empty-note">takde entry lagi. tulis something bila kau rasa nak lepaskan or simpan sesuatu.</p>`;
    }
    entries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'diary-entry';
      div.innerHTML = `
        <div class="diary-tape" style="background:${e.tape_color || 'var(--tealSoft)'}"></div>
        <div class="diary-date">${new Date(e.created_at).toLocaleDateString('ms-MY')}</div>
        <div class="diary-text">${escapeHtml(e.text)}</div>
      `;
      listEl.appendChild(div);
    });
  }

  // release modal logic
  const overlay = document.getElementById('release-overlay');
  const paperEl = document.getElementById('release-paper');
  const envelopeEl = document.getElementById('release-envelope');
  const textarea = document.getElementById('release-textarea');
  const actionsEl = document.getElementById('release-actions');

  function openRelease() {
    overlay.classList.add('active');
    textarea.value = '';
    textarea.disabled = false;
    paperEl.className = 'release-paper';
    paperEl.style.display = '';
    envelopeEl.className = 'release-envelope';
    actionsEl.style.display = 'flex';
  }
  function closeRelease() {
    overlay.classList.remove('active');
  }
  document.getElementById('open-release').addEventListener('click', () => { playPop(); openRelease(); });
  document.getElementById('release-close').addEventListener('click', closeRelease);

  document.getElementById('release-burn').addEventListener('click', () => {
    actionsEl.style.display = 'none';
    textarea.disabled = true;
    paperEl.classList.add('burning');
    playSwoosh();
    setTimeout(() => {
      // intentionally not persisted - that's the point of "lepaskan"
      closeRelease();
    }, 620);
  });

  document.getElementById('release-keep').addEventListener('click', () => {
    const text = textarea.value.trim();
    actionsEl.style.display = 'none';
    textarea.disabled = true;
    paperEl.classList.add('keeping');
    setTimeout(() => {
      paperEl.style.display = 'none';
      envelopeEl.classList.add('show');
      playChime();
      setTimeout(() => {
        if (text.length > 0) {
          const tape = tapeColors[Math.floor(Math.random() * tapeColors.length)];
          addDiaryEntry(text, tape);
          renderDiary();
        }
        closeRelease();
      }, 550);
    }, 570);
  });

  // =========================================================
  // GALLERY
  // =========================================================
  function getGalleryPhotos() { return store.get('sq_gallery', []); }

  let justAddedPhotoId = null;

  function renderGallery() {
    const photos = getGalleryPhotos();
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '';
    if (photos.length === 0) {
      grid.innerHTML = `<p class="empty-note">belum ada bukti lagi — siapkan quest atau upload gambar untuk start collection kau.</p>`;
    }
    photos.forEach((p, i) => {
      const deg = (i % 2 ? 1 : -1) * (2 + (i % 3));
      const div = document.createElement('div');
      div.className = 'polaroid' + (p.id === justAddedPhotoId ? ' developing' : '');
      div.style.transform = `rotate(${deg}deg)`;
      div.innerHTML = `
        <img src="${p.uri}" alt="${escapeHtml(p.caption || '')}">
        <div class="polaroid-caption">${escapeHtml(p.caption || '')}</div>
      `;
      grid.appendChild(div);
    });
    justAddedPhotoId = null;
  }

  document.getElementById('upload-photo-btn').addEventListener('click', () => {
    playPop();
    document.getElementById('gallery-file-input').click();
  });
  document.getElementById('gallery-file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    try {
      const uri = await readAndCompressImage(file);
      justAddedPhotoId = addGalleryPhoto(uri, 'new win! ✨', null);
      playChime();
      renderGallery();
    } catch (err) { console.warn(err); }
  });

  // =========================================================
  // GOALS
  // =========================================================
  const defaultWorkouts = [
    { icon: '🏃', name: '15 min brisk walk' },
    { icon: '🤸', name: 'bodyweight circuit' },
    { icon: '🧘', name: 'stretch before tidur' },
  ];

  function getActiveGoal() { return store.get('sq_goal', null); }
  function setActiveGoal(g) { store.set('sq_goal', g); }
  function getWorkouts() { return store.get('sq_workouts', []); }
  function setWorkouts(w) { store.set('sq_workouts', w); }

  function createGoal(title) {
    const goal = { id: uid(), title, created_at: new Date().toISOString(), target_weeks: 4, current_week: 1 };
    setActiveGoal(goal);
    const workouts = defaultWorkouts.map(w => ({ id: uid(), goal_id: goal.id, name: w.name, icon: w.icon, done: 0, photo_uri: null }));
    setWorkouts(workouts);
  }

  async function toggleWorkout(id, pos) {
    const workouts = getWorkouts();
    const w = workouts.find(x => x.id === id);
    if (!w) return;
    const nowDone = !w.done;
    if (nowDone) {
      pendingWorkoutId = id;
      pendingWorkoutPos = pos;
      document.getElementById('quest-file-input-goal').click();
      return;
    }
    w.done = 0;
    w.photo_uri = null;
    setWorkouts(workouts);
    renderGoals();
  }

  let pendingWorkoutId = null;
  let pendingWorkoutPos = null;

  function renderGoals(celebrate) {
    const goal = getActiveGoal();
    const container = document.getElementById('goals-content');

    if (!goal) {
      container.innerHTML = `
        <div class="goal-box">
          <div class="goal-label">set a goal for this month</div>
          <input class="goal-input" id="goal-title-input" type="text" placeholder="contoh: lose 2kg this month">
          <button class="create-btn" id="goal-create-btn">create goal</button>
        </div>
      `;
      document.getElementById('goal-create-btn').addEventListener('click', () => {
        const val = document.getElementById('goal-title-input').value.trim();
        if (!val) return;
        playChime();
        createGoal(val);
        renderGoals();
      });
      return;
    }

    const workouts = getWorkouts();
    const doneCount = workouts.filter(w => w.done).length;
    const pct = Math.min(20 + doneCount * 20, 100);
    const plant = pct >= 80 ? '🌳' : pct >= 50 ? '🌿' : '🌱';

    container.innerHTML = `
      <div class="goal-box">
        <div class="goal-label">current goal</div>
        <div class="goal-title">${escapeHtml(goal.title)}</div>
        <div class="plant-emoji" id="plant-emoji">${plant}</div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:${pct}%"></div></div>
        <div class="week-label">week ${goal.current_week} of ${goal.target_weeks}</div>
      </div>
      <div class="section-label">suggested workout quests</div>
      <div id="workout-list"></div>
    `;

    const listEl = document.getElementById('workout-list');
    workouts.forEach(w => {
      const div = document.createElement('div');
      div.className = 'workout-card' + (celebrate && celebrate.workoutId === w.id ? ' just-completed' : '');
      div.dataset.workoutId = w.id;
      if (w.done) div.style.opacity = '0.55';
      div.innerHTML = `
        <div class="workout-icon">${w.icon}</div>
        <div class="workout-name" style="${w.done ? 'text-decoration:line-through;' : ''}">${escapeHtml(w.name)}</div>
        <div class="workout-btn" data-id="${w.id}">${w.done ? '✓' : '○'}</div>
      `;
      listEl.appendChild(div);
    });
    listEl.querySelectorAll('.workout-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const rect = btn.getBoundingClientRect();
        playPop();
        toggleWorkout(btn.dataset.id, { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 });
      });
    });

    if (celebrate && celebrate.workoutId) {
      playChime();
      const pos = celebrate.pos || { x: window.innerWidth / 2, y: window.innerHeight / 2 };
      burstConfetti(pos.x, pos.y, ['var(--teal)', 'var(--tealSoft)', 'var(--amber)']);
      bumpClass(document.getElementById('plant-emoji'), 'bump');
      bumpClass(document.getElementById('progress-fill'), 'bump');
    }
  }

  // hidden file input for workout photo proof
  const goalFileInput = document.createElement('input');
  goalFileInput.type = 'file';
  goalFileInput.accept = 'image/*';
  goalFileInput.capture = 'environment';
  goalFileInput.id = 'quest-file-input-goal';
  goalFileInput.style.display = 'none';
  document.body.appendChild(goalFileInput);
  goalFileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if (!pendingWorkoutId) { pendingWorkoutPos = null; return; }
    const workouts = getWorkouts();
    const w = workouts.find(x => x.id === pendingWorkoutId);
    if (!w) { pendingWorkoutId = null; pendingWorkoutPos = null; return; }
    let photoUri = null;
    if (file) {
      try { photoUri = await readAndCompressImage(file); } catch (err) { photoUri = null; }
    }
    w.done = 1;
    w.photo_uri = photoUri;
    setWorkouts(workouts);
    const celebrate = { workoutId: w.id, pos: pendingWorkoutPos };
    pendingWorkoutId = null;
    pendingWorkoutPos = null;
    renderGoals(celebrate);
  });

  // ---------- utils ----------
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  // ---------- init ----------
  renderQuests();
  renderDiary();
  renderGallery();
  renderGoals();
})();
</script>
</body>
</html>
